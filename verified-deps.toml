[[dependency]]
name = "sgp4"
version = "2.25"
verified_date = "2026-03-13"
verified_via = "https://pypi.org/project/sgp4/"
methods_used = [
    "sgp4.api.Satrec.twoline2rv(line1, line2, WGS72)",
