    "sgp4.api.WGS72",
    "sgp4.api.WGS84",
]
notes = "Compiles official C++ from Revisiting Spacetrack Report #3. Default WGS72 (recommended for TLE-derived orbits). Returns position in km, velocity in km/s (TEME frame)."

